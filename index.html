<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Echo Maze</title>

<style>

html, body{
height:100%;
overflow:hidden; /* prevents scroll refresh */
touch-action:none; /* disables pull-to-refresh */
}

body{
font-family:Arial;
text-align:center;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
margin:0;
padding:10px;
}

#maze{
font-family:monospace;
font-size:24px;
white-space:pre;
margin-top:20px;
background:black;
padding:20px;
border-radius:10px;
display:inline-block;
}

button{
width:160px;
height:45px;
font-size:16px;
margin:8px;
border-radius:8px;
border:none;
background:#ff9800;
color:white;
cursor:pointer;
}

.green{
color:#00ff00;
font-weight:bold;
}

</style>

</head>

<body>

<h2>🎮 Echo Maze</h2>

<div>Move: W A S D or Swipe</div>

<button onclick="startGame()">Start</button>

<div id="level"></div>
<div id="timer"></div>
<div id="word"></div>
<div id="maze"></div>

<button onclick="pulse()">🔊</button>

<script>

const SIZE=10
const RADIUS=2

let level=1
let timer=0
let timerInterval
let pulses=3

let playerX=8
let playerY=1

let word=""
let found=[]
let collected=[]

let words=["MOON","PLANT","FOREST"]

let maze=[
['#','#','#','#','#','#','#','#','#','#'],
['#','.','.','.','#','.','.','.','.','#'],
['#','.','#','.','#','.','#','.','.','#'],
['#','.','#','.','.','.','#','.','#','#'],
['#','.','.','#','#','.','.','.','.','#'],
['#','#','.','.','#','.','#','#','.','#'],
['#','.','.','#','.','.','.','#','.','#'],
['#','.','#','.','.','#','.','.','.','#'],
['#','.','.','.','#','.','#','.','.','#'],
['#','#','#','#','#','#','#','#','#','#']
]

let visible=[]

function resetArrays(){
visible=[]
collected=[]
for(let i=0;i<SIZE;i++){
visible[i]=Array(SIZE).fill(0)
collected[i]=Array(SIZE).fill(false)
}
}

function startGame(){
level=1
placeExit()
resetGame()
startTimer()
}

function startTimer(){
clearInterval(timerInterval)
timer=0
timerInterval=setInterval(()=>{
timer++
document.getElementById("timer").innerText="Time: "+timer
},1000)
}

function stopTimer(){
clearInterval(timerInterval)
}

function resetGame(){
resetArrays()
playerX=8
playerY=1
revealArea()
displayMaze()
}

function placeExit(){
for(let i=0;i<SIZE;i++)
for(let j=0;j<SIZE;j++)
if(maze[i][j]=='E') maze[i][j]='.'

while(true){
let x=Math.random()*SIZE|0
let y=Math.random()*SIZE|0
if(maze[x][y]=='.'){
maze[x][y]='E'
break
}
}
}

function placeWord(){
word=words[level-2]
found=Array(word.length).fill(false)

for(let i=0;i<SIZE;i++)
for(let j=0;j<SIZE;j++)
if(maze[i][j]!='#') maze[i][j]='.'

for(let k=0;k<word.length;k++){
while(true){
let x=Math.random()*SIZE|0
let y=Math.random()*SIZE|0
if(maze[x][y]=='.'){
maze[x][y]=word[k]
break
}
}
}
}

function displayMaze(){
let out=""
for(let i=0;i<SIZE;i++){
for(let j=0;j<SIZE;j++){
if(i==playerX && j==playerY) out+="P "
else if(visible[i][j]) out+=maze[i][j]+" "
else out+="? "
}
out+="\n"
}
document.getElementById("maze").innerText=out
document.getElementById("level").innerText="Level "+level

if(level>1){
let w="Word: "
for(let i=0;i<word.length;i++){
w+=found[i] ? "<span class='green'>"+word[i]+"</span> " : "_ "
}
document.getElementById("word").innerHTML=w
}
}

function revealArea(){
for(let i=playerX-RADIUS;i<=playerX+RADIUS;i++)
for(let j=playerY-RADIUS;j<=playerY+RADIUS;j++)
if(i>=0&&j>=0&&i<SIZE&&j<SIZE)
visible[i][j]=1
displayMaze()
}

function movePlayer(m){
let x=playerX,y=playerY
if(m=='w')x--
if(m=='s')x++
if(m=='a')y--
if(m=='d')y++

if(x>=0&&y>=0&&x<SIZE&&y<SIZE&&maze[x][y]!='#'){
playerX=x;playerY=y
}

let cell=maze[playerX][playerY]

if(level==1 && cell=='E'){
stopTimer()
alert("Level 1 done")
level++
placeWord()
resetGame()
startTimer()
return
}

if(level>1 && cell!='.' && cell!='#'){
for(let i=0;i<word.length;i++){
if(word[i]==cell && !found[i] && !collected[playerX][playerY]){
found[i]=true
collected[playerX][playerY]=true
visible[playerX][playerY]=1
alert("Found "+cell)
break
}
}

if(found.every(v=>v)){
stopTimer()
alert("Level done")
level++
if(level-2<words.length){
placeWord()
resetGame()
startTimer()
}
}
}

displayMaze()
}

function pulse(){
if(pulses<=0){alert("No pulses");return}
pulses--
revealArea()
}

// keyboard
document.addEventListener("keydown",e=>{
if(e.key=='w')movePlayer('w')
if(e.key=='s')movePlayer('s')
if(e.key=='a')movePlayer('a')
if(e.key=='d')movePlayer('d')
})

// TOUCH FIX (IMPORTANT)
let sx=0,sy=0

document.addEventListener("touchstart",e=>{
e.preventDefault()
sx=e.touches[0].clientX
sy=e.touches[0].clientY
},{passive:false})

document.addEventListener("touchend",e=>{
e.preventDefault()

let dx=e.changedTouches[0].clientX-sx
let dy=e.changedTouches[0].clientY-sy

if(Math.abs(dx)>Math.abs(dy)){
if(dx>40)movePlayer('d')
else if(dx<-40)movePlayer('a')
}else{
if(dy>40)movePlayer('s')
else if(dy<-40)movePlayer('w')
}

},{passive:false})

</script>

</body>
</html>
